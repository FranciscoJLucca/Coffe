<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- WebApp / PWA Metadata -->
  <meta name="theme-color" content="#181512" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Método 4:6" />
  <link class="apple-touch-icon" href="icon-192.png" />
  <link rel="manifest" href="manifest.json" />

  <!-- Fonts and External CSS -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&family=DM+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header>
    <p class="eyebrow" id="main-eyebrow">Tetsu Kasuya · World Brewers Cup 2016</p>
    <h1 id="main-title">The 4:6 Method</h1>
    <p class="sub" id="main-sub">A V60 pour-over technique with two independent controls — flavor in the first 40%, strength in the last 60%.</p>
  </header>
  
  <main>
    <!-- Recipe Selector Tabs -->
    <div class="recipe-selector">
      <button class="recipe-tab active" id="tab-46" onclick="setRecipe('46')">O Método 4:6</button>
      <button class="recipe-tab" id="tab-ultimate" onclick="setRecipe('ultimate')">Ultimate V60</button>
    </div>

    <div class="controls">
      <!-- Card 1: Water Volume -->
      <div class="card">
        <p class="label" id="lbl-water">Water Volume</p>
        <div class="water-input-wrapper">
          <input type="number" class="water-input" id="water-val" value="300" oninput="updateWater(this.value)" min="0" max="3000" />
          <span class="water-input-unit">ml</span>
        </div>
        <p class="step-note" id="coffee-note">20g coffee</p>
      </div>
      
      <!-- Card 2: Flavor / Grind (Dynamic) -->
      <div class="card" id="card-flavor-grind"></div>
      
      <!-- Card 3: Body / Temp (Dynamic) -->
      <div class="card" id="card-body-temp"></div>
    </div>

    <!-- Pour Rhythm Graphic -->
    <div class="card" style="margin-bottom:20px">
      <p class="label" id="lbl-rhythm">Pour rhythm</p>
      <div class="rhythm-bars" id="rhythm-bars"></div>
      <div class="legend">
        <span class="leg" id="leg-flavor"><span class="leg-dot" style="background:var(--gold)"></span>Flavor (40%)</span>
        <span class="leg" id="leg-strength"><span class="leg-dot" style="background:var(--sage)"></span>Strength (60%)</span>
      </div>
    </div>

    <!-- Brew Steps -->
    <p class="steps-label" id="lbl-steps">Brew steps · 93°C water · wait 30s between each pour</p>
    <div id="steps-list"></div>

    <!-- Summary -->
    <div class="summary" id="summary"></div>
  </main>

  <script src="locales/en.js"></script>
  <script src="locales/es.js"></script>
  <script src="locales/pt.js"></script>
  <script src="locales/ja.js"></script>

  <!-- External JavaScript -->
  <script src="app.js"></script>
</body>
</html>
